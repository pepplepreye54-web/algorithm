<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorting Visualizer</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    #container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 300px;
      margin-top: 20px;
    }

    .bar {
      width: 20px;
      margin: 2px;
      background: #38bdf8;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

  <h1>Sorting Visualizer (Bubble Sort)</h1>

  <button onclick="generateArray()">Generate New</button>
  <button onclick="bubbleSort()">Start Sorting</button>

  <div id="container"></div>

  <script>
    let array = [];
    const container = document.getElementById("container");

    function generateArray() {
      container.innerHTML = "";
      array = [];

      for (let i = 0; i < 20; i++) {
        let value = Math.floor(Math.random() * 200) + 20;
        array.push(value);

        let bar = document.createElement("div");
        bar.classList.add("bar");
        bar.style.height = value + "px";

        container.appendChild(bar);
      }
    }

    async function bubbleSort() {
      let bars = document.getElementsByClassName("bar");

      for (let i = 0; i < array.length; i++) {
        for (let j = 0; j < array.length - i - 1; j++) {

          bars[j].style.background = "red";
          bars[j + 1].style.background = "red";

          await sleep(100);

          if (array[j] > array[j + 1]) {
            // Swap values
            let temp = array[j];
            array[j] = array[j + 1];
            array[j + 1] = temp;

            // Update UI
            bars[j].style.height = array[j] + "px";
            bars[j + 1].style.height = array[j + 1] + "px";
          }

          bars[j].style.background = "#38bdf8";
          bars[j + 1].style.background = "#38bdf8";
        }
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Initial array
    generateArray();
  </script>

</body>
</html>
